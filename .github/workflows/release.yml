name: Build and Release Click2Key (Inno Setup)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2

      # Restore packages – now targeting the root .csproj
      - name: Restore NuGet Packages
        run: nuget restore Click2Key.csproj

      # Build the project in Release mode
      - name: Build Project (Release)
        shell: cmd
        run: |
          msbuild Click2Key.csproj ^
            /p:Configuration=Release ^
            /p:Platform="Any CPU"

      # Gather all build outputs into a staging folder
      - name: Prepare staging folder
        shell: powershell
        run: |
          Remove-Item -Recurse -Force release-staging -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path release-staging
          # With a root project, output is under .\bin\Release
          Copy-Item -Path ".\bin\Release\*" -Destination ".\release-staging\" -Recurse -Force

      # Install Inno Setup
      - name: Install Inno Setup
        shell: powershell
        run: |
          $url = "https://files.jrsoftware.org/is/6/innosetup-6.4.0.exe"
          $installer = "innosetup.exe"
          Invoke-WebRequest -Uri $url -OutFile $installer
          Start-Process -FilePath $installer -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART /DIR=C:\inno" -Wait
          Write-Host "Inno Setup installed to C:\inno"

      # Compile the setup script
      - name: Compile Inno Setup installer
        shell: cmd
        run: |
          "C:\inno\ISCC.exe" setup.iss

      # Upload the installer as an artifact (optional but useful for debugging)
      - name: Upload Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Click2Key-Setup
          path: Click2Key-Setup.exe

      # Create a GitHub Release and attach the installer
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Click2Key v1.0.${{ github.run_number }}
          generate_release_notes: true
          files: Click2Key-Setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}