name: Build and Release Click2Key

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2

      - name: Restore NuGet Packages
        run: nuget restore .\Click2Key\Click2Key.csproj   # adjust path if different

      - name: Build Project
        shell: cmd
        run: |
          msbuild .\Click2Key\Click2Key.csproj ^
            /p:Configuration=Release ^
            /p:Platform="Any CPU"

      - name: Create Release Staging Folder
        shell: powershell
        run: |
          Remove-Item -Recurse -Force release-staging -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path release-staging
          Copy-Item -Path ".\Click2Key\bin\Release\*" -Destination ".\release-staging\" -Recurse -Force

      - name: Create ZIP Archive
        shell: powershell
        run: |
          Compress-Archive -Path ".\release-staging\*" -DestinationPath "Click2Key.zip" -CompressionLevel Optimal

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Click2Key-Release
          path: Click2Key.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Click2Key v1.0.${{ github.run_number }}
          generate_release_notes: true
          files: Click2Key.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}